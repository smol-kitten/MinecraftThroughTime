name: .NET Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: self-hosted
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 8.0.x

    - name: Add .NET to PATH
      run: echo "${{ github.workspace }}/.dotnet" >> $GITHUB_PATH

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore -p:EnableWindowsTargeting=true

    - name: Publish self-contained
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: dotnet publish -c Release --output ./Release --runtime win-x86 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:EnableWindowsTargeting=true -p:DebugType=none -p:DebugSymbols=false

    - name: Upload build artifacts
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v7
      continue-on-error: true  # tolerate artifact storage-quota failures
      with:
        name: MinecraftThroughTime
        path: ./Release/
        retention-days: 7
